<!-- @dsCard group="Components" viewport="700x280" name="Forms" subtitle="Input, Textarea, Switch — purple focus ring, error state" -->
<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { padding: 20px 24px; background: var(--background); }
    @keyframes movik-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Input, Textarea, Switch } = window.Movik || {};

    function Demo() {
      return (
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              <label style={{fontFamily:'var(--font-sans)',fontSize:'14px',fontWeight:500,color:'var(--foreground)'}}>Company Name</label>
              <input placeholder="Acme Freight LLC" style={{height:'36px',padding:'0 12px',fontFamily:'var(--font-sans)',fontSize:'14px',border:'1px solid var(--input)',borderRadius:'var(--radius-md)',outline:'none',color:'var(--foreground)'}} onFocus={e=>e.target.style.boxShadow='0 0 0 3px color-mix(in oklch,var(--primary) 50%,transparent)'} onBlur={e=>e.target.style.boxShadow='none'} />
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              <label style={{fontFamily:'var(--font-sans)',fontSize:'14px',fontWeight:500,color:'var(--foreground)'}}>MC Number</label>
              <input placeholder="MC-123456" style={{height:'36px',padding:'0 12px',fontFamily:'var(--font-mono)',fontSize:'14px',border:'1px solid var(--destructive)',borderRadius:'var(--radius-md)',outline:'none',color:'var(--foreground)'}} />
              <span style={{fontSize:'12px',color:'var(--destructive)',fontFamily:'var(--font-sans)'}}>MC Number is required.</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              <label style={{fontFamily:'var(--font-sans)',fontSize:'14px',fontWeight:500,color:'var(--muted-foreground)'}}>Disabled</label>
              <input disabled value="Read only" style={{height:'36px',padding:'0 12px',fontFamily:'var(--font-sans)',fontSize:'14px',border:'1px solid var(--input)',borderRadius:'var(--radius-md)',background:'var(--muted)',color:'var(--muted-foreground)',cursor:'not-allowed'}} />
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              <label style={{fontFamily:'var(--font-sans)',fontSize:'14px',fontWeight:500,color:'var(--foreground)'}}>Notes</label>
              <textarea rows={4} placeholder="Add any notes about this load…" style={{padding:'8px 12px',fontFamily:'var(--font-sans)',fontSize:'14px',border:'1px solid var(--input)',borderRadius:'var(--radius-md)',outline:'none',resize:'vertical',color:'var(--foreground)'}} onFocus={e=>e.target.style.boxShadow='0 0 0 3px color-mix(in oklch,var(--primary) 50%,transparent)'} onBlur={e=>e.target.style.boxShadow='none'} />
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'10px',paddingTop:'4px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'12px',cursor:'pointer'}}>
                <div style={{width:'40px',height:'22px',borderRadius:'9999px',background:'var(--primary)',position:'relative',flexShrink:0}}>
                  <span style={{position:'absolute',top:'3px',left:'21px',width:'16px',height:'16px',borderRadius:'50%',background:'#fff'}}></span>
                </div>
                <span style={{fontFamily:'var(--font-sans)',fontSize:'14px',fontWeight:500,color:'var(--foreground)'}}>Email notifications</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'12px',cursor:'not-allowed',opacity:0.5}}>
                <div style={{width:'40px',height:'22px',borderRadius:'9999px',background:'var(--border)',position:'relative',flexShrink:0}}>
                  <span style={{position:'absolute',top:'3px',left:'3px',width:'16px',height:'16px',borderRadius:'50%',background:'#fff'}}></span>
                </div>
                <span style={{fontFamily:'var(--font-sans)',fontSize:'14px',fontWeight:500,color:'var(--foreground)'}}>Disabled toggle</span>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
