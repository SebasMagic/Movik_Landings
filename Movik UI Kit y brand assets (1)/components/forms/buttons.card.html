<!-- @dsCard group="Components" viewport="700x180" name="Buttons" subtitle="6 variants × 3 sizes — primary / secondary / outline / ghost / destructive / link" -->
<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body { padding: 20px 24px; background: var(--background); display: flex; flex-direction: column; gap: 16px; }
    @keyframes movik-spin { to { transform: rotate(360deg); } }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-family: var(--font-sans); font-weight: 600; border: none; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition-colors); outline: none; }
    .btn:focus-visible { box-shadow: 0 0 0 3px color-mix(in oklch, var(--primary) 50%, transparent); }
    .btn-sm { padding: 6px 12px; font-size: 12px; height: 32px; }
    .btn-default { padding: 8px 16px; font-size: 14px; height: 36px; }
    .btn-lg { padding: 10px 24px; font-size: 16px; height: 44px; }
    .btn-icon { padding: 0; width: 36px; height: 36px; font-size: 16px; }
    .primary { background: var(--primary); color: #fff; } .primary:hover { background: oklch(0.43 0.27 286); }
    .secondary { background: var(--secondary); color: var(--foreground); border: 1px solid var(--border); } .secondary:hover { background: var(--muted); }
    .outline { background: transparent; color: var(--foreground); border: 1px solid var(--border); } .outline:hover { background: var(--muted); }
    .ghost { background: transparent; color: var(--foreground); } .ghost:hover { background: var(--muted); }
    .destructive { background: var(--destructive); color: #fff; } .destructive:hover { background: oklch(0.48 0.22 25); }
    .link-btn { background: transparent; color: var(--primary); text-decoration: underline; padding: 0; height: auto; }
    .disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
  </style>
</head>
<body>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-default primary">Primary</button>
    <button class="btn btn-default secondary">Secondary</button>
    <button class="btn btn-default outline">Outline</button>
    <button class="btn btn-default ghost">Ghost</button>
    <button class="btn btn-default destructive">Destructive</button>
    <button class="btn link-btn">Link</button>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-sm primary">Small</button>
    <button class="btn btn-default primary">Default</button>
    <button class="btn btn-lg primary">Large</button>
    <button class="btn btn-icon outline" style="font-size:18px">＋</button>
    <button class="btn btn-default primary disabled">Disabled</button>
    <button class="btn btn-default outline" style="gap:6px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
    <button class="btn btn-default primary" style="gap:6px">
      <span style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:movik-spin 0.7s linear infinite;display:inline-block"></span>
      Processing…
    </button>
  </div>
</body>
</html>
