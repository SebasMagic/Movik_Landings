<!-- @dsCard group="Colors" viewport="700x120" name="Neutrals" subtitle="Background, surface, border, and text tokens" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{padding:16px;display:flex;gap:8px;align-items:flex-end;background:#e5e5e5}</style>
</head>
<body>
  <div style="display:flex;flex-direction:column;gap:4px;flex:1">
    <div style="height:56px;border-radius:var(--radius-md);background:var(--background);border:1px solid var(--border)"></div>
    <span style="font:var(--type-caption);color:#444">--background<br><span style="font-family:monospace">#FFFFFF</span></span>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;flex:1">
    <div style="height:56px;border-radius:var(--radius-md);background:var(--card);border:1px solid var(--border)"></div>
    <span style="font:var(--type-caption);color:#444">--card<br><span style="font-family:monospace">#F5F5F6</span></span>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;flex:1">
    <div style="height:56px;border-radius:var(--radius-md);background:var(--muted)"></div>
    <span style="font:var(--type-caption);color:#444">--muted<br><span style="font-family:monospace">#F3F3F4</span></span>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;flex:1">
    <div style="height:56px;border-radius:var(--radius-md);background:var(--border)"></div>
    <span style="font:var(--type-caption);color:#444">--border<br><span style="font-family:monospace">#EBEBED</span></span>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;flex:1">
    <div style="height:56px;border-radius:var(--radius-md);background:var(--muted-foreground)"></div>
    <span style="font:var(--type-caption);color:#444">--muted-fg<br><span style="font-family:monospace">#6B6B76</span></span>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;flex:1">
    <div style="height:56px;border-radius:var(--radius-md);background:var(--foreground)"></div>
    <span style="font:var(--type-caption);color:#444">--foreground<br><span style="font-family:monospace">#0C0A20</span></span>
  </div>
</body>
</html>
