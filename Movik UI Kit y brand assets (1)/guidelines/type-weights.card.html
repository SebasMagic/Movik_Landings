<!-- @dsCard group="Type" viewport="700x130" name="Weight Scale" subtitle="Five weights — Regular through Extrabold — at consistent 16px" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{padding:20px 24px;background:var(--background)}</style>
</head>
<body>
  <div style="display:flex;gap:0;flex-direction:column">
    <div style="display:grid;grid-template-columns:140px 1fr 80px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="font:var(--type-caption);color:var(--muted-foreground)">Regular 400</span>
      <span style="font-family:var(--font-sans);font-size:16px;font-weight:400;color:var(--foreground)">body copy, descriptions</span>
    </div>
    <div style="display:grid;grid-template-columns:140px 1fr 80px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="font:var(--type-caption);color:var(--muted-foreground)">Medium 500</span>
      <span style="font-family:var(--font-sans);font-size:16px;font-weight:500;color:var(--foreground)">nav items, labels, UI text</span>
    </div>
    <div style="display:grid;grid-template-columns:140px 1fr 80px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="font:var(--type-caption);color:var(--muted-foreground)">Semibold 600</span>
      <span style="font-family:var(--font-sans);font-size:16px;font-weight:600;color:var(--foreground)">card titles, buttons, subheadings</span>
    </div>
    <div style="display:grid;grid-template-columns:140px 1fr 80px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="font:var(--type-caption);color:var(--muted-foreground)">Bold 700</span>
      <span style="font-family:var(--font-sans);font-size:16px;font-weight:700;color:var(--foreground)">page headings, strong emphasis</span>
    </div>
    <div style="display:grid;grid-template-columns:140px 1fr 80px;align-items:center;padding:5px 0">
      <span style="font:var(--type-caption);color:var(--muted-foreground)">Extrabold 800</span>
      <span style="font-family:var(--font-sans);font-size:16px;font-weight:800;color:var(--foreground)">display, hero headings</span>
    </div>
  </div>
</body>
</html>
