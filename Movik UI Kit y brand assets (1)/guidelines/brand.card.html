<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{padding:0;display:flex;background:var(--background)}</style>
</head>
<body>
  <div style="flex:1;padding:24px 32px;display:flex;align-items:center;justify-content:center;background:var(--background);border-right:1px solid var(--border)">
    <img src="https://movik.us/movik_purple.avif" alt="Movik — purple" style="height:36px">
  </div>
  <div style="flex:1;padding:24px 32px;display:flex;align-items:center;justify-content:center;background:var(--foreground)">
    <img src="https://movik.us/movik_white.avif" alt="Movik — white" style="height:36px">
  </div>
</body>
</html>
