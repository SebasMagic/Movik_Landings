<!-- @dsCard group="Type" viewport="700x220" name="Display & Headings" subtitle="Plus Jakarta Sans — extrabold for display, bold for headings, semibold for sub-headings" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{padding:20px 24px;background:var(--background)}</style>
</head>
<body>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;align-items:baseline;gap:12px">
      <span style="font-family:var(--font-sans);font-size:48px;font-weight:800;color:var(--foreground);letter-spacing:-0.02em;line-height:1">The future of freight</span>
      <span style="font:var(--type-caption);color:var(--muted-foreground);white-space:nowrap">48 / extrabold</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:12px">
      <span style="font-family:var(--font-sans);font-size:36px;font-weight:700;color:var(--foreground);letter-spacing:-0.02em;line-height:1">Dashboard Overview</span>
      <span style="font:var(--type-caption);color:var(--muted-foreground);white-space:nowrap">36 / bold</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:12px">
      <span style="font-family:var(--font-sans);font-size:30px;font-weight:700;color:var(--foreground);line-height:1">Active Loads</span>
      <span style="font:var(--type-caption);color:var(--muted-foreground);white-space:nowrap">30 / bold</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:12px">
      <span style="font-family:var(--font-sans);font-size:24px;font-weight:600;color:var(--foreground);line-height:1">Load Details</span>
      <span style="font:var(--type-caption);color:var(--muted-foreground);white-space:nowrap">24 / semibold</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:12px">
      <span style="font-family:var(--font-sans);font-size:20px;font-weight:600;color:var(--foreground);line-height:1">Debtor Information</span>
      <span style="font:var(--type-caption);color:var(--muted-foreground);white-space:nowrap">20 / semibold</span>
    </div>
  </div>
</body>
</html>
