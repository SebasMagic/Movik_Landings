<!-- @dsCard group="Spacing" viewport="700x100" name="Spacing Scale" subtitle="4px base unit — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{padding:16px 24px;background:var(--background);display:flex;align-items:flex-end;gap:16px}</style>
</head>
<body>
  <div style="display:flex;align-items:flex-end;gap:8px;flex:1">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:4px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">4</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:8px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">8</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:12px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">12</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:16px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">16</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:24px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">24</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:32px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">32</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:48px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">48</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="background:var(--primary);border-radius:2px;width:24px;height:64px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">64</span>
    </div>
  </div>
</body>
</html>
