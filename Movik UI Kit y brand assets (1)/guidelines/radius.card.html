<!-- @dsCard group="Spacing" viewport="700x80" name="Border Radius" subtitle="none (0) / sm (6px) / md (8px) / full (9999px)" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css">
<style>body{padding:16px 24px;background:var(--background);display:flex;align-items:center;gap:24px}</style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:20px;flex:1">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:56px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:0"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">none · 0px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:56px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:6px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">sm · 6px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:56px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:8px"></div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">md · 8px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:80px;height:32px;background:var(--primary);border-radius:9999px;display:flex;align-items:center;justify-content:center">
        <span style="font:var(--type-caption);color:white">Pill</span>
      </div>
      <span style="font:var(--type-caption);color:var(--muted-foreground)">full · 9999px</span>
    </div>
  </div>
</body>
</html>
